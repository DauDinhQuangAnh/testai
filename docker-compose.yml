services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: subtitle_studio
      POSTGRES_USER: subtitle_studio
      POSTGRES_PASSWORD: subtitle_studio
    ports:
      # Map ra 15432 (khong phai 5432 mac dinh) vi may dev thuc te co san 1
      # Postgres native (Windows Service) chiem cong 5432 - xem HANDOFF.md
      # muc 3. Phai khop voi DATABASE_URL trong .env (port 15432).
      - "15432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  postgres_data:
