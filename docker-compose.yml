services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: subtitle_studio
      POSTGRES_USER: subtitle_studio
      POSTGRES_PASSWORD: subtitle_studio
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  postgres_data:
