# Cau hinh Alembic (DB migration). URL ket noi KHONG nam o day - env.py doc
# DATABASE_URL tu .env/bien moi truong (giong app/db/session.py) de khong
# phai duy tri 2 noi. Lenh hay dung (tu goc repo, venv da kich hoat):
#   python -m alembic upgrade head      # nang schema len ban moi nhat
#   python -m alembic revision -m "..." --autogenerate  # tao migration moi
# Backend FastAPI tu chay `upgrade head` luc khoi dong (backend/main.py).

[alembic]
script_location = %(here)s/migrations
prepend_sys_path = %(here)s
path_separator = os

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %%(levelname)-5.5s [%%(name)s] %%(message)s
datefmt = %%H:%%M:%%S
